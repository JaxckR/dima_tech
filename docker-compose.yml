services:
  web:
    build:
      context: ./
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    command: [
      "uvicorn",
      "dima_tech.bootstrap.entrypoints.web:create_app",
      "--factory",
      "--host", "0.0.0.0",
      "--port", "8000",
      "--workers", "4"
    ]
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 1536M
        reservations:
          memory: 256M

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d app" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  migrations:
    build:
      context: ./
      dockerfile: ./Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    command: ["alembic", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
